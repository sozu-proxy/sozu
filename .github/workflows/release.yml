---
name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+-rc.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re-)build a release for'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    name: Preflight (resolve tag, validate Cargo.toml)
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
      prerelease: ${{ steps.resolve.outputs.prerelease }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve tag
        id: resolve
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "Resolved tag: ${TAG}"
          if ! echo "${TAG}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$'; then
            echo "::error::Tag '${TAG}' does not match the release pattern."
            exit 1
          fi
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "version=${TAG}" >> "${GITHUB_OUTPUT}"
          if echo "${TAG}" | grep -q '\-rc\.'; then
            echo "prerelease=true" >> "${GITHUB_OUTPUT}"
          else
            echo "prerelease=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Assert per-crate Cargo.toml versions match tag
        env:
          EXPECTED: ${{ steps.resolve.outputs.version }}
        run: |
          # The repo has no `[workspace.package]` table; each crate pins
          # its own `[package].version`. Validate every workspace member
          # so a partial bump cannot ship.
          set -euo pipefail
          fail=0
          for manifest in bin/Cargo.toml lib/Cargo.toml command/Cargo.toml e2e/Cargo.toml; do
            v=$(grep -m1 -oP '^[[:space:]]*version[[:space:]]*=[[:space:]]*"\K[^"]+' "${manifest}" || true)
            echo "${manifest}: ${v}"
            if [ "${v}" != "${EXPECTED}" ]; then
              echo "::error file=${manifest}::version ${v} does not match tag ${EXPECTED}"
              fail=1
            fi
          done
          if [ "${fail}" -ne 0 ]; then
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }} (${{ matrix.provider }})
    needs: preflight
    runs-on: ${{ matrix.runner }}
    strategy:
      # `fail-fast: false` so a single cell failure does NOT cancel the
      # other in-flight cells — maximises diagnostic surface on the
      # first attempt. The `release` job uses `needs: [preflight,
      # build]` so any cell failure still prevents publication; partial
      # release is structurally impossible.
      fail-fast: false
      matrix:
        # 12 cells = 4 ring + 4 aws-lc-rs + 2 openssl-gnu + 2 fips-gnu.
        # `crypto-openssl` is gnu-only because rustls-openssl pulls in
        # `openssl-sys`, which on musl needs `openssl/vendored` to link
        # cleanly — out of scope here. `fips` is gnu-only because the
        # aws-lc-fips-sys precompiled FIPS module assumes glibc; cmake
        # is required for the aws-lc-rs C bindings (incl. fips).
        include:
          # crypto-ring (default, ring backend) — all 4 targets
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            provider: crypto-ring
            apt: protobuf-compiler
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            provider: crypto-ring
            apt: protobuf-compiler musl-tools
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            provider: crypto-ring
            apt: protobuf-compiler
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            provider: crypto-ring
            apt: protobuf-compiler musl-tools
          # crypto-aws-lc-rs (post-quantum capable, AWS-LC backend) — all 4 targets
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            provider: crypto-aws-lc-rs
            apt: protobuf-compiler cmake
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            provider: crypto-aws-lc-rs
            apt: protobuf-compiler cmake musl-tools
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            provider: crypto-aws-lc-rs
            apt: protobuf-compiler cmake
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            provider: crypto-aws-lc-rs
            apt: protobuf-compiler cmake musl-tools
          # crypto-openssl (system OpenSSL backend) — gnu only
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            provider: crypto-openssl
            apt: protobuf-compiler libssl-dev pkg-config
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            provider: crypto-openssl
            apt: protobuf-compiler libssl-dev pkg-config
          # fips (aws-lc-rs in FIPS mode, no SLA per project policy) — gnu only
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            provider: fips
            apt: protobuf-compiler cmake
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            provider: fips
            apt: protobuf-compiler cmake
    steps:
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}

      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ needs.preflight.outputs.tag }}

      - name: Install rust 1.88.0
        # SHA pin keeps the action at a known revision; `with.toolchain`
        # makes the rustc version explicit (the action otherwise keys off
        # `github.action_ref`, which a SHA ref does not carry).
        uses: dtolnay/rust-toolchain@98e1b82157cd469e843cb7f524c1313b4ad9492c  # branch 1.88.0
        with:
          toolchain: 1.88.0
          targets: ${{ matrix.target }}

      - name: Cache cargo target
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae  # v2
        with:
          cache-all-crates: true
          prefix-key: release-${{ matrix.target }}-${{ matrix.provider }}

      - name: Resolve SOURCE_DATE_EPOCH from tag commit
        id: sde
        run: |
          # Reproducibility best-effort: pin the build clock to the
          # tagged commit's committer time so any timestamp written
          # into the binary by toolchain steps that honour
          # SOURCE_DATE_EPOCH is deterministic across reruns and
          # across matrix cells.
          set -euo pipefail
          SDE=$(git log -1 --format=%ct HEAD)
          echo "epoch=${SDE}" >> "${GITHUB_OUTPUT}"

      - name: Build sozu (release)
        env:
          SOURCE_DATE_EPOCH: ${{ steps.sde.outputs.epoch }}
        run: |
          cargo build --locked --release -p sozu \
            --no-default-features --features jemallocator,${{ matrix.provider }} \
            --target ${{ matrix.target }}

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/sozu

      - name: Stage tarball contents
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
          TARGET: ${{ matrix.target }}
          PROVIDER: ${{ matrix.provider }}
          SOURCE_DATE_EPOCH: ${{ steps.sde.outputs.epoch }}
        run: |
          set -euo pipefail
          STAGE="sozu-${VERSION}-${TARGET}-${PROVIDER}"
          mkdir -p "${STAGE}"
          cp "target/${TARGET}/release/sozu" "${STAGE}/sozu"
          cp LICENSE "${STAGE}/LICENSE-AGPL3"
          cp command/LICENSE-LGPL3 "${STAGE}/LICENSE-LGPL3"
          cp README.md "${STAGE}/README.md"
          cp CHANGELOG.md "${STAGE}/CHANGELOG.md"
          # Use the packaging variant — `bin/config.toml` is the developer
          # testing config and references `../lib/assets/*` paths absent
          # from the tarball; `os-build/config.toml` is the production-shaped
          # default already used by the Dockerfile.
          cp os-build/config.toml "${STAGE}/config.toml"
          cp os-build/systemd/sozu.service "${STAGE}/sozu.service"
          cp os-build/systemd/sozu@.service "${STAGE}/sozu@.service"
          # Corresponding-source pointer for downstream redistributors who
          # mirror only the tarball (AGPL §6, LGPL §4). The GitHub Release
          # auto-attaches a source archive; this pointer survives mirror.
          cat > "${STAGE}/SOURCE.txt" <<EOF
          Sōzu source code corresponding to this binary tarball is available at:

            https://github.com/sozu-proxy/sozu/releases/tag/${VERSION}
            https://github.com/sozu-proxy/sozu (commit tagged ${VERSION})

          The 'sozu' binary contains:
            - sozu-lib (lib/) and sozu (bin/) — AGPL-3.0-or-later
            - sozu-command-lib (command/) — LGPL-3.0-or-later

          The full AGPL-3.0 license text is in this archive as LICENSE-AGPL3.
          The full LGPL-3.0 license text is in this archive as LICENSE-LGPL3.

          Build configuration:
            - target: ${TARGET}
            - crypto provider feature: ${PROVIDER}
            - cargo features: jemallocator,${PROVIDER}
          EOF
          # Reproducibility best-effort: pin tar mtimes to
          # SOURCE_DATE_EPOCH and use a stable owner/sort.
          tar --sort=name --owner=0 --group=0 --numeric-owner \
              --mtime="@${SOURCE_DATE_EPOCH}" \
              -czf "${STAGE}.tar.gz" "${STAGE}"

      - name: Upload artefact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: sozu-${{ needs.preflight.outputs.version }}-${{ matrix.target }}-${{ matrix.provider }}
          path: |
            sozu-${{ needs.preflight.outputs.version }}-${{ matrix.target }}-${{ matrix.provider }}.tar.gz
          retention-days: 7

  release:
    name: Publish GitHub Release (draft)
    needs: [preflight, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # `id-token: write` allows cosign to obtain a sigstore OIDC token
      # for keyless signing (no maintainer GPG key is stored anywhere).
      # `attestations: write` lets `actions/attest-build-provenance`
      # record SLSA build provenance against the artefacts.
      id-token: write
      attestations: write
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ needs.preflight.outputs.tag }}

      - name: Download all artefacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          path: dist
          merge-multiple: true

      - name: Verify all 12 tarballs landed
        working-directory: dist
        run: |
          set -euo pipefail
          # Defensive count assertion — catches silent collisions if
          # `download-artifact merge-multiple: true` ever flattens two
          # cells into the same name. 12 = 4 ring + 4 aws-lc-rs + 2
          # openssl-gnu + 2 fips-gnu (matches the build matrix above).
          count=$(find . -maxdepth 1 -name 'sozu-*.tar.gz' | wc -l)
          if [ "${count}" -ne 12 ]; then
            echo "::error::expected 12 tarballs in dist/, found ${count}"
            ls -la
            exit 1
          fi
          echo "Found ${count} tarballs:"
          ls -la sozu-*.tar.gz

      - name: Aggregate SHA256SUMS
        working-directory: dist
        run: |
          set -euo pipefail
          sha256sum sozu-*.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@f713795cb21599bc4e5c4b58cbad1da852d7eeb9  # v3

      - name: Sign SHA256SUMS (keyless via sigstore)
        working-directory: dist
        env:
          COSIGN_YES: 'true'
        run: |
          set -euo pipefail
          # Keyless signing — no static secret. The OIDC token presented
          # by `id-token: write` is exchanged with sigstore's Fulcio for
          # a short-lived signing certificate; the signature and
          # certificate are recorded in Rekor and emitted as side files.
          # Operators verify with cosign >= 2.4.1 (GHSA-whqx-f9j3-ch6m):
          #   cosign verify-blob \
          #     --certificate SHA256SUMS.pem \
          #     --signature SHA256SUMS.sig \
          #     --certificate-identity-regexp '^https://github\.com/sozu-proxy/sozu/\.github/workflows/release\.yml@refs/tags/[0-9]+\.[0-9]+\.[0-9]+(-rc\.[0-9]+)?$' \
          #     --certificate-oidc-issuer https://token.actions.githubusercontent.com \
          #     --certificate-github-workflow-repository sozu-proxy/sozu \
          #     --certificate-github-workflow-ref 'refs/tags/${VERSION}' \
          #     SHA256SUMS
          # The anchored regex pins the issuing workflow to release.yml
          # at a release-shaped tag, so a future helper workflow with
          # id-token:write cannot act as a signing oracle for SHA256SUMS.
          cosign sign-blob \
            --output-signature SHA256SUMS.sig \
            --output-certificate SHA256SUMS.pem \
            SHA256SUMS

      - name: Generate SLSA build provenance
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661  # v3
        with:
          subject-path: 'dist/sozu-*.tar.gz'

      - name: Extract changelog section
        env:
          VERSION: ${{ needs.preflight.outputs.version }}
        run: |
          set -euo pipefail
          # Extract the `## [VERSION]` section into RELEASE_BODY.md and
          # pass it to action-gh-release via `body_path` (heredoc-safe).
          # If the section is missing, emit a `::warning::` so the run
          # page surfaces the silent skip — operators can still edit the
          # draft before publishing — but DO NOT fail the workflow:
          # missing changelog stanzas should not block a real release.
          awk -v ver="${VERSION}" '
            BEGIN { in_section = 0 }
            /^## \[/ {
              if (in_section) exit
              if ($0 ~ ("^## \\[" ver "\\]")) { in_section = 1; next }
            }
            in_section { print }
          ' CHANGELOG.md > RELEASE_BODY.md
          if [ ! -s RELEASE_BODY.md ]; then
            echo "::warning::CHANGELOG.md has no '## [${VERSION}]' section; the draft release body falls back to a placeholder. Edit the draft before publishing."
            {
              echo "Pre-built binaries for ${VERSION}."
              echo ""
              echo "Verify with: \`sha256sum -c SHA256SUMS\`."
              echo ""
              echo "_NOTE_: this body was auto-generated because the maintainer did not move the \`## [Unreleased]\` block into a \`## [${VERSION}]\` section before tagging. Edit before publishing."
            } > RELEASE_BODY.md
          fi
          cat RELEASE_BODY.md

      - name: Create GitHub Release (draft)
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          name: ${{ needs.preflight.outputs.version }}
          draft: true
          prerelease: ${{ needs.preflight.outputs.prerelease }}
          body_path: RELEASE_BODY.md
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS
            dist/SHA256SUMS.sig
            dist/SHA256SUMS.pem

  docker-release:
    name: Docker Hub (tagged image)
    # Gate on `release` so a cosign / SLSA / softprops/action-gh-release
    # failure also blocks the version-pinned Docker push — keeps binary,
    # image, and the GitHub Release page consistent. The `:latest` alias
    # must never move when the matching tarballs are not yet published
    # on the GitHub Release page.
    needs: [preflight, build, release]
    if: needs.preflight.outputs.prerelease == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          ref: ${{ needs.preflight.outputs.tag }}
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7
        with:
          context: .
          push: 'true'
          # `:latest` is only updated for tag-push events (the canonical
          # release path). `workflow_dispatch` rebuilds of older stable
          # tags publish only the version-pinned image and never roll
          # `:latest` backward.
          tags: |
            clevercloud/sozu:${{ needs.preflight.outputs.version }}
            ${{ github.event_name == 'push' && 'clevercloud/sozu:latest' || '' }}
