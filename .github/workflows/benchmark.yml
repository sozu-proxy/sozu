---
name: Benchmark

on: [ push, pull_request ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-bombardier:
    name: Build Bombardier 💣️
    runs-on: ubuntu-latest
    steps:
      - name: Clone bombardier
        uses: actions/checkout@v4
        with:
          repository: codesenberg/bombardier
          path: .

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          check-latest: false

      - name: Build bombardier
        run: go build -o bombardier

      - name: 📤 Upload bombardier
        uses: actions/upload-artifact@v4
        with:
          name: bombardier
          path: bombardier

  build-lagging_server:
    name: Build Lagging_Server ⚡️
    runs-on: ubuntu-latest
    steps:
      - name: Install rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - name: Clone lagging_server
        uses: actions/checkout@v4
        with:
          repository: CleverCloud/lagging_server
          path: .

      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true
          prefix-key: "lagging_server"
      
      - name: Build lagging_server
        run: cargo build --release
    
      - name: 📤 Upload lagging_server
        uses: actions/upload-artifact@v4
        with:
          name: lagging_server
          path: target/release/lagging_server

  build-sozu:
    name: Build Sozu 🦀 (${{ matrix.provider }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        provider: [crypto-ring, crypto-aws-lc-rs, crypto-openssl, fips]
    steps:
      - name: Install protobuf compiler and cmake
        run: sudo apt-get install -y protobuf-compiler cmake

      # Pin to project MSRV (matches the clippy/crypto-providers jobs).
      # `dtolnay/rust-toolchain` does not inject `-D warnings`, so the
      # newer stable lints fired by the GitHub runner (e.g.
      # `mismatched_lifetime_syntaxes` on rust 1.95) do not break the
      # build artefact path.
      - name: Install rust 1.88.0
        uses: dtolnay/rust-toolchain@1.88.0

      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true
          prefix-key: "sozu-${{ matrix.provider }}"

      - name: Build Sozu
        run: cargo build --release -p sozu --no-default-features --features jemallocator,${{ matrix.provider }}

      - name: 📤 Upload sozu
        uses: actions/upload-artifact@v4
        with:
          name: sozu-${{ matrix.provider }}
          path: target/release/sozu

  build-bench-logger:
    name: Build bench_logger 🦀
    runs-on: ubuntu-latest
    steps:
      - name: Install protobuf compiler
        run:  sudo apt-get install -y protobuf-compiler

      - name: Install rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""

      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true
          prefix-key: "sozu"

      - name: Build Sozu bench logger (for benchmarking)
        run: cargo build --release --example bench_logger

      - name: 📤 Upload sozu bench logger
        uses: actions/upload-artifact@v4
        with:
          name: bench_logger
          path: target/release/examples/bench_logger

  bench:
      name: Benchmark 🎯 (${{ matrix.provider }})
      runs-on: ubuntu-latest
      needs: [build-bombardier, build-lagging_server, build-sozu]
      strategy:
        fail-fast: false
        matrix:
          provider: [crypto-ring, crypto-aws-lc-rs, crypto-openssl, fips]
      steps:
      - uses: actions/checkout@v4

      - name: 📥 Download bombardier
        uses: actions/download-artifact@v4
        with:
          name: bombardier
          path: .github/workflows
      - name: 📥 Download lagging_server
        uses: actions/download-artifact@v4
        with:
          name: lagging_server
          path: .github/workflows
      - name: 📥 Download sozu
        uses: actions/download-artifact@v4
        with:
          name: sozu-${{ matrix.provider }}
          path: .github/workflows

      - name: Host mapping sozu.io domains
        run: |
          sudo echo "0.0.0.0 sozu.io" | sudo tee -a /etc/hosts
          sudo echo "0.0.0.0 rsa-2048.sozu.io" | sudo tee -a /etc/hosts
          sudo echo "0.0.0.0 rsa-4096.sozu.io" | sudo tee -a /etc/hosts
          sudo echo "0.0.0.0 ecdsa.sozu.io" | sudo tee -a /etc/hosts

      - name: Generate TLS key rsa 2048
        working-directory: .github/workflows
        run: |
          openssl req -newkey rsa:2048 -nodes -keyout rsa-2048.key -out rsa-2048.csr -config rsa-2048.cnf
          openssl x509 -req -days 365 -in rsa-2048.csr -signkey rsa-2048.key -out rsa-2048.pem -extensions req_ext -extfile rsa-2048.cnf
          openssl x509 -in rsa-2048.pem -noout -checkhost rsa-2048.sozu.io
          sudo cp rsa-2048.pem /usr/local/share/ca-certificates/rsa-2048.crt
          sudo update-ca-certificates
      
      - name: Generate TLS key rsa 4096
        working-directory: .github/workflows
        run: |
          openssl req -newkey rsa:4096 -nodes -keyout rsa-4096.key -out rsa-4096.csr -config rsa-4096.cnf
          openssl x509 -req -days 365 -in rsa-4096.csr -signkey rsa-4096.key -out rsa-4096.pem -extensions req_ext -extfile rsa-4096.cnf
          openssl x509 -in rsa-4096.pem -noout -checkhost rsa-4096.sozu.io
          sudo cp rsa-4096.pem /usr/local/share/ca-certificates/rsa-4096.crt
          sudo update-ca-certificates
      
      - name: Generate TLS key ecdsa
        working-directory: .github/workflows
        run: |
          openssl ecparam -name prime256v1 -genkey -out ecdsa.key
          openssl req -new -key ecdsa.key -out ecdsa.csr -config ecdsa.cnf
          openssl x509 -req -days 365 -in ecdsa.csr -signkey ecdsa.key -out ecdsa.pem -extensions req_ext -extfile ecdsa.cnf
          openssl x509 -in ecdsa.pem -noout -checkhost ecdsa.sozu.io
          sudo cp ecdsa.pem /usr/local/share/ca-certificates/ecdsa.crt
          sudo update-ca-certificates

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Fix rights
        working-directory: .github/workflows
        run: |
          chmod +x bombardier
          chmod +x lagging_server
          chmod +x sozu

      - name: ⚡ Launch bench
        working-directory: .github/workflows
        run: python bench.py

  criterion:
      name: Criterion benches 🦀 (${{ matrix.provider }})
      runs-on: ubuntu-latest
      timeout-minutes: 30
      strategy:
        # Same provider matrix as the Bombardier bench so a regression
        # in any provider's TLS handshake / cert load / KX path shows
        # up in the Criterion artefacts. `fail-fast: false` so a
        # single-provider failure does not cancel siblings.
        fail-fast: false
        matrix:
          provider: [crypto-ring, crypto-aws-lc-rs, crypto-openssl, fips]
      steps:
        - name: Install system dependencies
          run: sudo apt-get update && sudo apt-get install -y protobuf-compiler cmake

        - name: Install rust 1.88.0
          uses: dtolnay/rust-toolchain@1.88.0

        - uses: actions/checkout@v4

        - uses: Swatinem/rust-cache@v2
          with:
            cache-all-crates: true
            prefix-key: "criterion-${{ matrix.provider }}"

        # `cargo bench` walks every `[[bench]]` target in `lib/benches/`:
        # `crypto_provider` (provider init / cert load / KX), `h2_scheduling`
        # (RFC 9218 priority sort), and `header_formatting` (header
        # write hot path). Each provider runs the full set so we
        # catch handshake / pseudo-header / cert-load regressions in
        # any direction. `--no-run` would compile only; we want real
        # samples so dashboards and Criterion's text reports populate.
        - name: Run Criterion benches with ${{ matrix.provider }}
          run: cargo bench -p sozu-lib --no-default-features --features ${{ matrix.provider }}

        - name: 📤 Upload Criterion report
          if: always()
          uses: actions/upload-artifact@v4
          with:
            name: criterion-${{ matrix.provider }}
            path: target/criterion

  bench-logs:
      name: benchmark the logger
      runs-on: ubuntu-latest
      needs: [build-sozu, build-bench-logger]
      steps:
      - uses: actions/checkout@v4

      - name: 📥 Download sozu
        uses: actions/download-artifact@v4
        with:
          name: sozu-crypto-ring
          path: .github/workflows

      - name: 📥 Download sozu bench logger
        uses: actions/download-artifact@v4
        with:
          name: bench_logger
          path: .github/workflows

      - name: Fix rights
        working-directory: .github/workflows
        run: |
          chmod +x sozu
          chmod +x bench_logger

      - name: Bench the logs
        working-directory: .github/workflows
        run: python bench_logs.py
