---
name: CI
on: [ push, pull_request ]
jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      # `protoc` + a build of `sozu-command-lib` are required so that
      # `command/build.rs` regenerates `command/src/proto/command.rs`
      # before rustfmt walks the module tree (rustfmt fails to resolve
      # `mod command;` if the generated file is absent).
      - name: install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Checkout sources
        uses: actions/checkout@v4
      # rustfmt.toml uses the unstable `ignore` key, so the format check
      # must run on nightly. See CLAUDE.md "Build" section.
      - name: Install rust nightly (rustfmt)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: Generate prost output (sozu-command-lib build.rs)
        run: cargo +nightly check -p sozu-command-lib --locked
      - name: Check formatting
        run: cargo +nightly fmt --all -- --check
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Checkout sources
        uses: actions/checkout@v4
      # Match the project's pinned toolchain (`rust-toolchain` = 1.88.0)
      # so the lint baseline matches what CLAUDE.md "Build" documents.
      # Stable 1.95 fires `mismatched_lifetime_syntaxes` and a few other
      # newer lints that have not yet been triaged across the workspace;
      # tracking those is its own follow-up rather than a CI gate today.
      - name: Install rust 1.88.0 (clippy)
        uses: dtolnay/rust-toolchain@1.88.0
        with:
          components: clippy
      # `--all-features` matches the local lint baseline documented in
      # CLAUDE.md "Build". Workspace is currently warning-free on 1.88.0.
      - name: Lint
        run: cargo clippy --all-targets --all-features --locked -- -D warnings
  msrv:
    name: MSRV (1.88)
    runs-on: ubuntu-latest
    steps:
      - name: install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Checkout sources
        uses: actions/checkout@v4
      # `rust-toolchain` pins 1.88.0 for everyday dev; this job verifies
      # the advertised MSRV per Cargo.toml `rust-version = "1.88.0"`.
      - name: Install rust 1.88.0 (advertised MSRV)
        uses: dtolnay/rust-toolchain@1.88.0
      - name: Build with MSRV
        run: cargo build --all-features --locked
  test:
    name: Test
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      matrix:
        experimental: [false]
        rust:
          - stable
          - beta
        include:
          - rust: nightly
            experimental: true
    steps:
      - name: install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Install rust (${{ matrix.rust }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - name: Install nightly toolchain (for fuzz targets)
        run: rustup toolchain install nightly --profile minimal
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Install h2spec (for test_h2spec_conformance)
        run: |
          H2SPEC_VERSION=2.6.0
          curl -fsSL "https://github.com/summerwind/h2spec/releases/download/v${H2SPEC_VERSION}/h2spec_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin h2spec
          h2spec --version
      - name: Build
        run: cargo build --locked --all-features
      - name: Test
        run: cargo test --locked --all-features --verbose
  crypto-providers:
    name: Crypto provider ${{ matrix.provider }}
    runs-on: ubuntu-latest
    # The e2e step exercises 328 real-listener tests behind rustls. On
    # cold-cache CI runners with provider-specific cmake builds (notably
    # `aws-lc-rs` / `fips`) the build + e2e step has been observed at
    # ~30 min on the slowest provider; budget 60 min so a transient
    # runner slowdown does not flake the whole matrix.
    timeout-minutes: 60
    strategy:
      # Don't cancel sibling matrix entries on a single-provider failure —
      # the goal is to know which providers passed and which broke.
      fail-fast: false
      matrix:
        provider:
          - crypto-ring
          - crypto-aws-lc-rs
          - crypto-openssl
          - fips
    steps:
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler cmake
      - name: Checkout sources
        uses: actions/checkout@v4
      # Match the project's pinned toolchain (`rust-toolchain = 1.88.0`
      # and `rust-version = "1.88.0"`). Stable 1.95 fires the new
      # `mismatched_lifetime_syntaxes` lint that has not yet been
      # triaged across the workspace; the clippy job pins 1.88.0 for
      # the same reason. `dtolnay/rust-toolchain` (unlike
      # `actions-rust-lang/setup-rust-toolchain`) does not inject
      # `-D warnings` into RUSTFLAGS, so build steps stay portable.
      - name: Install rust 1.88.0
        uses: dtolnay/rust-toolchain@1.88.0
      - name: Install h2spec (for test_h2spec_conformance under e2e)
        run: |
          H2SPEC_VERSION=2.6.0
          curl -fsSL "https://github.com/summerwind/h2spec/releases/download/v${H2SPEC_VERSION}/h2spec_linux_amd64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin h2spec
          h2spec --version
      - name: Install nightly toolchain (for cargo-fuzz targets in e2e)
        run: rustup toolchain install nightly --profile minimal
      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Build with ${{ matrix.provider }}
        run: cargo build -p sozu -p sozu-lib -p sozu-command-lib --locked --no-default-features --features ${{ matrix.provider }}
      - name: sozu-lib unit tests with ${{ matrix.provider }}
        run: cargo test -p sozu-lib --locked --no-default-features --features ${{ matrix.provider }} --verbose
      # Run the full e2e suite against every crypto provider so a
      # provider-specific regression in TLS handshake, certificate
      # loading, ALPN selection, or H2 mux integration cannot slip in
      # behind a green ring-only e2e run. The e2e crate forwards each
      # provider feature to sozu-lib via its own `[features]` block in
      # `e2e/Cargo.toml`.
      - name: sozu-e2e suite with ${{ matrix.provider }}
        run: cargo test -p sozu-e2e --locked --no-default-features --features ${{ matrix.provider }} --verbose
  doc:
    name: Build documentation
    runs-on: ubuntu-latest
    steps:
      - name: install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Checkout sources
        uses: actions/checkout@v4
      - name: Install rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build docs
        run: cargo doc --verbose
  dockerhub:
    name: Docker build and push to Docker Hub
    runs-on: ubuntu-latest
    # SHA-only tagging on every push; release tagging is handled
    # separately, see RELEASE.md.
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: 'true'
          tags: clevercloud/sozu:${{ github.sha }}
...
