[package]
name = "sozu-e2e"
version = "1.1.1"
rust-version = "1.85.0"
edition = "2024"

[lints.rust.unexpected_cfgs]
level = "warn"
check-cfg = ["cfg(tarpaulin)"]

[dependencies]
futures = { workspace = true }
http-body-util = { workspace = true }
hyper = { workspace = true, features = ["client", "http1"] }
hyper-rustls = { workspace = true, features = ["ring", "webpki-tokio", "http1", "tls12", "logging"] }
hyper-util = { workspace = true, features = ["client-legacy", "http1"] }
libc = { workspace = true }
mio = { workspace = true }
rustls = { workspace = true }
time = { workspace = true }
tokio = { workspace = true, features = ["net", "rt-multi-thread"] }

sozu-command-lib = { workspace = true }
sozu-lib = { workspace = true, features = ["crypto-ring"] }
